<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceny zemědělských výrobků ČSÚ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a508b; text-align: center; margin-bottom: 10px; }
        .info { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9em; }
        .controls { margin-bottom: 25px; background: #e9ecef; padding: 20px; border-radius: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        select { padding: 12px; font-size: 16px; width: 100%; border-radius: 8px; border: 1px solid #ced4da; background-color: white; margin-bottom: 15px; }
        
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-png { background-color: #27ae60; color: white; }
        .btn-png:hover { background-color: #219150; }
        .btn-csv { background-color: #f39c12; color: white; }
        .btn-csv:hover { background-color: #d68910; }
        
        .loading-overlay { text-align: center; padding: 50px; font-size: 1.2em; color: #1a508b; }
        #chartWrapper { position: relative; height: 500px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Průměrné ceny zemědělských výrobků</h1>
    <div class="info">Zdroj dat: Český statistický úřad (otevřená data)</div>
    
    <div id="loader" class="loading-overlay">
        🔄 Načítám data přímo z ČSÚ, moment strpení...
    </div>
    
    <div class="controls" id="controls" style="display:none;">
        <label for="productSelect">Vyberte produkt:</label>
        <select id="productSelect"></select>
        
        <div class="button-group">
            <button class="btn btn-png" onclick="downloadChart()">🖼️ Stáhnout graf (PNG)</button>
            <button class="btn btn-csv" onclick="downloadCSV()">📊 Exportovat data do Excelu (CSV)</button>
        </div>
    </div>

    <div id="chartWrapper">
        <canvas id="priceChart"></canvas>
    </div>
</div>

<script>
    const ORIGINAL_URL = 'https://data.csu.gov.cz/opendata/sady/CEN0203B/distribuce/csv';
    const PROXY_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(ORIGINAL_URL);
    
    let rawData = [];
    let myChart = null;
    let currentFilteredData = [];

    Papa.parse(PROXY_URL, {
        download: true,
        header: true,
        dynamicTyping: true,
        skipEmptyLines: true,
        complete: function(results) {
            if (results.data && results.data.length > 0) {
                processData(results.data);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
            }
        }
    });

    function processData(data) {
        rawData = data.filter(row => 
            row["ČR a kraje-Stát"] === "CZ" && 
            row["ČR a kraje-Kraj"] === "" && 
            row["CASMKMQR"] && 
            row["CASMKMQR"].toString().length === 7 && 
            !row["CASMKMQR"].toString().includes('K') &&
            row["CASMKMQR"] >= "2015-01"
        );

        const products = [...new Set(rawData.map(row => row["Reprezentant"]))].sort();
        const select = document.getElementById('productSelect');
        
        products.forEach(p => {
            if(p) {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                select.appendChild(opt);
            }
        });

        select.addEventListener('change', () => updateChart(select.value));
        updateChart(products[0]);
    }

    function updateChart(productName) {
        currentFilteredData = rawData
            .filter(row => row["Reprezentant"] === productName)
            .sort((a, b) => a["CASMKMQR"].toString().localeCompare(b["CASMKMQR"].toString()));

        const labels = currentFilteredData.map(row => row["Měsíce, jejich kumulace, čtvrtletí, roky"]);
        const prices = currentFilteredData.map(row => row["Hodnota"]);

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Cena v Kč',
                    data: prices,
                    borderColor: '#1a508b',
                    backgroundColor: 'rgba(26, 80, 139, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    // FUNKCE PRO EXPORT OBRÁZKU
    function downloadChart() {
        const link = document.createElement('a');
        link.download = `graf-${document.getElementById('productSelect').value}.png`;
        link.href = document.getElementById('priceChart').toDataURL('image/png');
        link.click();
    }

    // FUNKCE PRO EXPORT DAT (CSV/EXCEL)
    function downloadCSV() {
        const productName = document.getElementById('productSelect').value;
        // Hlavička CSV
        let csvContent = "Období;Produkt;Cena (Kč)\n";
        
        // Obsah řádků
        currentFilteredData.forEach(row => {
            csvContent += `${row["Měsíce, jejich kumulace, čtvrtletí, roky"]};${row["Reprezentant"]};${row["Hodnota"]}\n`;
        });

        // Vytvoření souboru a stažení (s kódováním UTF-8 pro českou diakritiku)
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `data-${productName}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
