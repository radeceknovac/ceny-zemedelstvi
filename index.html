<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Ceny zemědělských výrobků ČSÚ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f8f9fa; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 25px; background: #e9ecef; padding: 20px; border-radius: 10px; }
        select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #ced4da; }
        #debug { background: #fff3cd; padding: 10px; margin-bottom: 10px; border: 1px solid #ffeeba; display: none; font-size: 12px; white-space: pre-wrap; }
        #chartWrapper { height: 500px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Průměrné ceny zemědělských výrobků</h1>
    <div id="debug"></div>
    <div id="loader">⚙️ Načítám a analyzuji data...</div>
    
    <div class="controls" id="controls" style="display:none;">
        <select id="productSelect"></select>
    </div>

    <div id="chartWrapper">
        <canvas id="priceChart"></canvas>
    </div>
</div>

<script>
    // Použijeme relativní cestu, ale s "cache-busterem" (ten čas na konci),
    // aby prohlížeč nestahoval starou verzi souboru.
    const DATA_URL = 'data.csv?v=' + new Date().getTime(); 
    
    let rawData = [];
    let myChart = null;

    function log(msg) {
        const d = document.getElementById('debug');
        d.style.display = 'block';
        d.innerText += msg + '\n';
    }

    Papa.parse(DATA_URL, {
        download: true,
        header: true,
        dynamicTyping: true,
        skipEmptyLines: true,
        complete: function(results) {
            log("Soubor načten. Počet řádků: " + results.data.length);
            
            if (results.data.length > 0) {
                // Kontrola názvů sloupců (vypíše je do žlutého boxu)
                log("Nalezené sloupce: " + Object.keys(results.data[0]).join(', '));
                processData(results.data);
            } else {
                log("CHYBA: Soubor je prázdný nebo má špatný formát.");
            }
        },
        error: function(err) {
            log("CHYBA při načítání: " + err);
        }
    });

    function processData(data) {
        // Filtrování: Musíme se trefit do přesných názvů sloupců v data.csv
        rawData = data.filter(row => 
            row["ČR a kraje-Stát"] === "CZ" && 
            row["CASMKMQR"] && 
            row["CASMKMQR"].toString().length === 7
        );

        log("Počet řádků po odfiltrování: " + rawData.length);

        const products = [...new Set(rawData.map(row => row["Reprezentant"]))].filter(Boolean).sort();
        const select = document.getElementById('productSelect');
        
        if (products.length === 0) {
            log("CHYBA: Nepodařilo se najít žádné produkty. Zkontroluj názvy sloupců v CSV!");
            return;
        }

        products.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });

        document.getElementById('loader').style.display = 'none';
        document.getElementById('controls').style.display = 'block';

        select.addEventListener('change', () => updateChart(select.value));
        updateChart(products[0]);
    }

    function updateChart(productName) {
        const productData = rawData
            .filter(row => row["Reprezentant"] === productName)
            .sort((a, b) => a["CASMKMQR"].toString().localeCompare(b["CASMKMQR"].toString()));

        const labels = productData.map(row => row["Měsíce, jejich kumulace, čtvrtletí, roky"]);
        const prices = productData.map(row => row["Hodnota"]);

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: productName,
                    data: prices,
                    borderColor: '#1a508b',
                    backgroundColor: 'rgba(26, 80, 139, 0.1)',
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }
</script>
</body>
</html>
