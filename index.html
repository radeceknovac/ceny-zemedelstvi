<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Ceny zemědělských výrobků (v Kč)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 20px; background-color: #f4f7f9; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a508b; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }
        
        .controls { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; }
        .col { flex: 1; min-width: 200px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-png { background: #27ae60; } .btn-png:hover { background: #219150; }
        .btn-csv { background: #f39c12; } .btn-csv:hover { background: #d68910; }
        
        #chartWrapper { height: 550px; position: relative; margin-top: 20px; }
        .footer { margin-top: 25px; text-align: center; font-size: 13px; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
        #loader { text-align: center; padding: 50px; font-weight: bold; color: #1a508b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Průměrné ceny zemědělských výrobků (v Kč)</h1>
    <div class="subtitle">Interaktivní srovnání cen v čase podle dat ČSÚ</div>
    
    <div id="loader">⌛ Načítám a připravuji data z data.csv...</div>
    
    <div class="controls" id="controls" style="display:none;">
        <div class="row">
            <div class="col">
                <label for="prod1">Hlavní produkt:</label>
                <select id="prod1"></select>
            </div>
            <div class="col">
                <label for="prod2">Produkt pro srovnání (volitelně):</label>
                <select id="prod2">
                    <option value="">-- Žádný --</option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="col">
                <label for="dateFrom">Období od:</label>
                <select id="dateFrom"></select>
            </div>
            <div class="col">
                <label for="dateTo">Období do:</label>
                <select id="dateTo"></select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-png" onclick="downloadChart()">🖼️ Uložit graf jako obrázek</button>
            <button class="btn btn-csv" onclick="downloadCSV()">📊 Exportovat data do Excelu</button>
        </div>
    </div>

    <div id="chartWrapper">
        <canvas id="priceChart"></canvas>
    </div>

    <div class="footer">
        Zdroj dat: <strong>ČSÚ - Průměrné ceny zemědělských výrobků</strong>
    </div>
</div>

<script>
    // Načítání lokálního souboru s cache-busterem
    const DATA_URL = 'data.csv?v=' + new Date().getTime();
    let rawData = [];
    let myChart = null;

    Papa.parse(DATA_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            // Očištění dat (pouze celorepublikové měsíční průměry)
            rawData = results.data.filter(row => {
                const mesic = String(row["CASMKMQR"] || "");
                const kraj = String(row["ČR a kraje-Kraj"] || "").trim();
                return row["Reprezentant"] && mesic.length === 7 && (kraj === "" || kraj === "null");
            });

            if (rawData.length > 0) {
                setupInterface();
            } else {
                document.getElementById('loader').innerHTML = "<b style='color:red'>Chyba: Nepodařilo se zpracovat data. Zkontrolujte soubor data.csv.</b>";
            }
        }
    });

    function setupInterface() {
        const products = [...new Set(rawData.map(row => row["Reprezentant"]))].sort();
        const dates = [...new Set(rawData.map(row => row["CASMKMQR"]))].sort();

        const s1 = document.getElementById('prod1');
        const s2 = document.getElementById('prod2');
        const df = document.getElementById('dateFrom');
        const dt = document.getElementById('dateTo');

        products.forEach(p => {
            s1.add(new Option(p, p));
            s2.add(new Option(p, p));
        });

        dates.forEach(d => {
            df.add(new Option(d, d));
            dt.add(new Option(d, d));
        });

        // Nastavení výchozích hodnot (celý rozsah, první produkt)
        df.value = dates[0];
        dt.value = dates[dates.length - 1];
        s1.value = products[0];

        // Reakce na změny výběru
        [s1, s2, df, dt].forEach(el => el.addEventListener('change', updateChart));

        document.getElementById('loader').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        updateChart();
    }

    function updateChart() {
        const p1 = document.getElementById('prod1').value;
        const p2 = document.getElementById('prod2').value;
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;

        const getSeries = (pName) => {
            if (!pName) return null;
            return rawData
                .filter(r => r["Reprezentant"] === pName && r["CASMKMQR"] >= from && r["CASMKMQR"] <= to)
                .sort((a, b) => String(a["CASMKMQR"]).localeCompare(String(b["CASMKMQR"])));
        };

        const data1 = getSeries(p1);
        const data2 = getSeries(p2);

        const labels = data1.map(r => r["Měsíce, jejich kumulace, čtvrtletí, roky"]);
        const datasets = [{
            label: p1 + " (Kč)",
            data: data1.map(r => parseFloat(String(r["Hodnota"]).replace(',', '.'))),
            borderColor: '#1a508b',
            backgroundColor: 'rgba(26, 80, 139, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.2,
            pointRadius: 2
        }];

        if (data2 && p2 !== "" && p2 !== p1) {
            datasets.push({
                label: p2 + " (Kč)",
                data: data2.map(r => parseFloat(String(r["Hodnota"]).replace(',', '.'))),
                borderColor: '#e74c3c',
                backgroundColor: 'rgba(231, 76, 60, 0.05)',
                borderWidth: 3,
                fill: true,
                tension: 0.2,
                pointRadius: 2
            });
        }

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, title: { display: true, text: 'Cena v Kč' } },
                    x: { ticks: { maxTicksLimit: 12 } }
                },
                plugins: {
                    legend: { position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
    }

    function downloadChart() {
        const p1 = document.getElementById('prod1').value;
        const link = document.createElement('a');
        link.download = `graf-ceny-${p1}.png`;
        link.href = document.getElementById('priceChart').toDataURL('image/png');
        link.click();
    }

    function downloadCSV() {
        const p1 = document.getElementById('prod1').value;
        const p2 = document.getElementById('prod2').value;
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;

        // Záhlaví CSV
        let csv = "\ufeffObdobí;Cena: " + p1 + " (Kč)";
        if (p2 && p2 !== "") csv += ";Cena: " + p2 + " (Kč)";
        csv += "\n";

        // Unikátní seznam měsíců v rozsahu
        const rangeDates = [...new Set(rawData
            .filter(r => r["CASMKMQR"] >= from && r["CASMKMQR"] <= to)
            .map(r => r["CASMKMQR"])
        )].sort();

        rangeDates.forEach(mesic => {
            const row1 = rawData.find(r => r["Reprezentant"] === p1 && r["CASMKMQR"] === mesic);
            const row2 = (p2 && p2 !== "") ? rawData.find(r => r["Reprezentant"] === p2 && r["CASMKMQR"] === mesic) : null;

            let line = `${mesic};${row1 ? row1["Hodnota"] : ""}`;
            if (p2 && p2 !== "") line += `;${row2 ? row2["Hodnota"] : ""}`;
            csv += line + "\n";
        });
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `export-ceny-${p1}.csv`);
        link.click();
    }
</script>
</body>
</html>
